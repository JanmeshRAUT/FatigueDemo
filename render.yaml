services:
  - type: web
    name: fatiguered-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker --workers 1 --timeout 120 --chdir backend --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: USE_MOCK_DATA
        value: "true"
